<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexusVault v3 · 资源合集分享</title>
<style>
/* ═══════════════════ TOKENS ═══════════════════ */
:root {
  --bg:       #0a0a12;
  --surface:  #12121f;
  --surface2: #1a1a2e;
  --fg:       #e0e0f0;
  --muted:    #6a6a8e;
  --border:   #2a2a45;
  --accent:   #00f0ff;
  --accent2:  #a855f7;
  --accent3:  #22d3ee;
  --success:  #10b981;
  --warn:     #f59e0b;
  --danger:   #ef4444;
  --glow:     0 0 20px rgba(0,240,255,0.3);
  --glow2:    0 0 30px rgba(168,85,247,0.25);
  --radius:   12px;
  --radius-sm: 8px;
  --font:     -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace;
}

/* ═══════════════════ RESET ═══════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-tap-highlight-color: transparent; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--fg);
  min-height: 100dvh;
  overflow-x: hidden;
  line-height: 1.6;
}
a { color: var(--accent); text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; }
img { max-width: 100%; display: block; }

/* ═══════════════════ SCROLLBAR ═══════════════════ */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent); }

/* ═══════════════════ ANIMATIONS ═══════════════════ */
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
@keyframes glow { 0%, 100% { box-shadow: var(--glow); } 50% { box-shadow: 0 0 40px rgba(0,240,255,0.5); } }
@keyframes scanline {
  0% { transform: translateY(-100%); }
  100% { transform: translateY(100vh); }
}
@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
@keyframes borderGlow {
  0%, 100% { border-color: var(--accent); }
  50% { border-color: var(--accent2); }
}
@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}
@keyframes modalIn {
  from { opacity: 0; transform: scale(0.9) translateY(20px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
@keyframes overlayIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
@keyframes ripple {
  0% { transform: scale(0); opacity: 0.6; }
  100% { transform: scale(4); opacity: 0; }
}

/* ═══════════════════ PARTICLE BG ═══════════════════ */
#particles-canvas {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
}

/* ═══════════════════ SCANLINE OVERLAY ═══════════════════ */
.scanline-overlay {
  position: fixed; inset: 0; z-index: 1; pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,240,255,0.015) 2px,
    rgba(0,240,255,0.015) 4px
  );
}

/* ═══════════════════ LAYOUT SHELL ═══════════════════ */
.app-shell {
  position: relative; z-index: 2;
  display: flex; flex-direction: column;
  min-height: 100dvh;
}

/* ═══════════════════ TOP NAV ═══════════════════ */
.topnav {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px; height: 56px;
  background: rgba(10,10,18,0.85);
  backdrop-filter: blur(20px) saturate(1.5);
  border-bottom: 1px solid var(--border);
}
.topnav-brand {
  display: flex; align-items: center; gap: 10px;
  font-weight: 700; font-size: 18px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.topnav-brand svg { flex-shrink: 0; }
.topnav-actions { display: flex; gap: 8px; }
.nav-btn {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  background: var(--surface2); border-radius: var(--radius-sm);
  color: var(--muted); transition: all 0.2s;
}
.nav-btn:hover, .nav-btn.active {
  color: var(--accent);
  background: rgba(0,240,255,0.1);
  box-shadow: var(--glow);
}

/* ═══════════════════ HERO ═══════════════════ */
.hero {
  text-align: center;
  padding: 40px 20px 30px;
  position: relative;
}
.hero-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 14px; border-radius: 20px;
  background: rgba(0,240,255,0.08);
  border: 1px solid rgba(0,240,255,0.2);
  color: var(--accent); font-size: 12px; font-weight: 600;
  letter-spacing: 0.05em; text-transform: uppercase;
  margin-bottom: 16px;
  animation: float 3s ease-in-out infinite;
}
.hero h1 {
  font-size: clamp(28px, 6vw, 42px);
  font-weight: 800;
  line-height: 1.2;
  margin-bottom: 10px;
  background: linear-gradient(135deg, var(--fg) 0%, var(--accent) 50%, var(--accent2) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.hero p {
  color: var(--muted); font-size: 15px;
  max-width: 500px; margin: 0 auto;
}

/* ═══════════════════ STATS BAR ═══════════════════ */
.stats-bar {
  display: flex; justify-content: center; gap: 24px;
  padding: 16px 20px;
  margin: 0 20px 20px;
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
}
.stat-item { text-align: center; }
.stat-num {
  font-family: var(--font-mono);
  font-size: 22px; font-weight: 700;
  color: var(--accent);
}
.stat-label { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* ═══════════════════ SEARCH ═══════════════════ */
.search-wrap {
  padding: 0 20px 16px;
}
.search-box {
  position: relative;
}
.search-box input {
  width: 100%; height: 44px;
  padding: 0 44px 0 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--fg); font-size: 14px;
  outline: none; transition: all 0.2s;
}
.search-box input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(0,240,255,0.1);
}
.search-box input::placeholder { color: var(--muted); }
.search-icon {
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  color: var(--muted); pointer-events: none;
}

/* ═══════════════════ TABS ═══════════════════ */
.tabs {
  display: flex; gap: 6px;
  padding: 0 20px 16px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab-btn {
  flex-shrink: 0;
  padding: 8px 16px;
  border-radius: 20px;
  font-size: 13px; font-weight: 600;
  background: var(--surface);
  color: var(--muted);
  border: 1px solid var(--border);
  transition: all 0.2s;
  white-space: nowrap;
}
.tab-btn:hover { color: var(--fg); border-color: var(--muted); }
.tab-btn.active {
  background: linear-gradient(135deg, rgba(0,240,255,0.15), rgba(168,85,247,0.15));
  color: var(--accent);
  border-color: var(--accent);
  box-shadow: var(--glow);
}

/* ═══════════════════ RESOURCE GRID ═══════════════════ */
.resources {
  padding: 0 20px 100px;
  display: flex; flex-direction: column; gap: 12px;
}
.resource-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  transition: all 0.3s;
  animation: fadeIn 0.4s ease-out both;
  position: relative;
  overflow: hidden;
}
.resource-card::before {
  content: '';
  position: absolute; top: 0; left: 0;
  width: 3px; height: 100%;
  border-radius: 3px 0 0 3px;
}
.resource-card.quark::before { background: linear-gradient(180deg, #6366f1, #818cf8); }
.resource-card.xunlei::before { background: linear-gradient(180deg, #3b82f6, #60a5fa); }
.resource-card.lanzou::before { background: linear-gradient(180deg, #f59e0b, #fbbf24); }

.resource-card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
  box-shadow: var(--glow);
}
.resource-header {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 10px;
}
.resource-icon {
  width: 44px; height: 44px;
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius-sm);
  font-size: 20px; font-weight: 800;
  flex-shrink: 0;
}
.resource-icon.quark {
  background: rgba(99,102,241,0.15); color: #818cf8;
}
.resource-icon.xunlei {
  background: rgba(59,130,246,0.15); color: #60a5fa;
}
.resource-icon.lanzou {
  background: rgba(245,158,11,0.15); color: #fbbf24;
}
.resource-info { flex: 1; margin-left: 12px; }
.resource-name {
  font-size: 15px; font-weight: 700;
  margin-bottom: 2px;
}
.resource-desc {
  font-size: 12px; color: var(--muted);
  line-height: 1.5;
}
.resource-meta {
  display: flex; align-items: center; gap: 12px;
  margin-top: 10px; flex-wrap: wrap;
}
.meta-tag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 8px; border-radius: 6px;
  font-size: 11px; font-weight: 600;
  background: rgba(0,240,255,0.06);
  color: var(--accent3);
  border: 1px solid rgba(0,240,255,0.12);
}
.meta-tag.type { color: var(--accent2); border-color: rgba(168,85,247,0.2); background: rgba(168,85,247,0.08); }
.meta-tag.size { color: var(--warn); border-color: rgba(245,158,11,0.2); background: rgba(245,158,11,0.08); }
.resource-actions {
  display: flex; gap: 8px; margin-top: 12px;
}
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 10px 18px;
  border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 600;
  transition: all 0.2s;
  position: relative; overflow: hidden;
}
.btn-primary {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #0a0a12;
}
.btn-primary:hover {
  box-shadow: var(--glow);
  transform: translateY(-1px);
}
.btn-secondary {
  background: var(--surface2);
  color: var(--fg);
  border: 1px solid var(--border);
}
.btn-secondary:hover {
  border-color: var(--accent);
  color: var(--accent);
}
.btn-sm {
  padding: 7px 12px; font-size: 12px;
}
.btn .ripple {
  position: absolute; border-radius: 50%;
  background: rgba(255,255,255,0.3);
  width: 20px; height: 20px;
  animation: ripple 0.6s ease-out;
}

/* ═══════════════════ SECTION HEADERS ═══════════════════ */
.section-head {
  display: flex; align-items: center; gap: 8px;
  padding: 0 20px; margin-bottom: 12px;
}
.section-head h2 {
  font-size: 16px; font-weight: 700;
}
.section-head .count {
  padding: 2px 8px; border-radius: 10px;
  font-size: 11px; font-weight: 700;
  background: rgba(0,240,255,0.1);
  color: var(--accent);
}

/* ═══════════════════ UPDATE MODAL ═══════════════════ */
.modal-overlay {
  position: fixed; inset: 0; z-index: 1000;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  animation: overlayIn 0.3s ease-out;
}
.modal-overlay.hidden { display: none; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  width: 100%; max-width: 400px;
  padding: 0;
  animation: modalIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  overflow: hidden;
}
.modal-glow {
  height: 3px;
  background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent));
  background-size: 200% 100%;
  animation: shimmer 2s linear infinite;
}
.modal-body {
  padding: 28px 24px 20px;
  text-align: center;
}
.modal-icon {
  width: 64px; height: 64px;
  margin: 0 auto 16px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  background: linear-gradient(135deg, rgba(0,240,255,0.15), rgba(168,85,247,0.15));
  border: 1px solid rgba(0,240,255,0.3);
  animation: glow 2s ease-in-out infinite;
}
.modal-icon svg { color: var(--accent); }
.modal-title {
  font-size: 20px; font-weight: 800;
  margin-bottom: 8px;
  background: linear-gradient(135deg, var(--fg), var(--accent));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.modal-desc {
  font-size: 13px; color: var(--muted);
  margin-bottom: 6px; line-height: 1.6;
}
.modal-version {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 12px; border-radius: 8px;
  background: rgba(16,185,129,0.1);
  border: 1px solid rgba(16,185,129,0.2);
  color: var(--success);
  font-size: 12px; font-weight: 700;
  font-family: var(--font-mono);
  margin-bottom: 20px;
}
.modal-footer {
  display: flex; gap: 10px;
  padding: 16px 24px 24px;
}
.modal-footer .btn { flex: 1; }
.btn-ghost {
  background: transparent;
  color: var(--muted);
  border: 1px solid var(--border);
}
.btn-ghost:hover { color: var(--fg); border-color: var(--muted); }

/* ═══════════════════ DETAIL MODAL ═══════════════════ */
.detail-modal .modal-body { text-align: left; padding: 24px; }
.detail-title {
  font-size: 18px; font-weight: 800;
  margin-bottom: 12px;
}
.detail-section {
  margin-bottom: 16px;
}
.detail-section h4 {
  font-size: 12px; font-weight: 700;
  color: var(--muted); text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 8px;
}
.detail-link {
  display: flex; align-items: center; gap: 10px;
  padding: 12px; border-radius: var(--radius-sm);
  background: var(--surface2);
  border: 1px solid var(--border);
  margin-bottom: 8px;
  transition: all 0.2s;
  word-break: break-all;
}
.detail-link:hover {
  border-color: var(--accent);
  background: rgba(0,240,255,0.05);
}
.detail-link-icon {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 8px; flex-shrink: 0;
  font-size: 14px; font-weight: 800;
}
.detail-link-text {
  flex: 1; min-width: 0;
}
.detail-link-name { font-size: 13px; font-weight: 600; }
.detail-link-url {
  font-size: 11px; color: var(--muted);
  font-family: var(--font-mono);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.detail-link .btn-sm { flex-shrink: 0; }


/* ═══════════════════ TOAST ═══════════════════ */
.toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  z-index: 2000;
  padding: 10px 20px; border-radius: 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--fg); font-size: 13px; font-weight: 600;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  opacity: 0; pointer-events: none;
  transition: all 0.3s;
}
.toast.show { opacity: 1; pointer-events: auto; }
.toast.success { border-color: var(--success); }
.toast.error { border-color: var(--danger); }

/* ═══════════════════ EMPTY STATE ═══════════════════ */
.empty-state {
  text-align: center; padding: 60px 20px;
  color: var(--muted);
}
.empty-state svg { margin: 0 auto 12px; opacity: 0.4; }
.empty-state p { font-size: 14px; }

/* ═══════════════════ SETTINGS PANEL ═══════════════════ */
.settings-panel {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
  display: flex; justify-content: flex-end;
  opacity: 0; pointer-events: none;
  transition: all 0.3s;
}
.settings-panel.open { opacity: 1; pointer-events: auto; }
.settings-drawer {
  width: 320px; max-width: 90vw; height: 100%;
  background: var(--surface);
  border-left: 1px solid var(--border);
  padding: 24px;
  overflow-y: auto;
  transform: translateX(100%);
  transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
}
.settings-panel.open .settings-drawer { transform: translateX(0); }
.settings-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px;
}
.settings-header h3 { font-size: 18px; font-weight: 700; }
.settings-group {
  margin-bottom: 20px;
}
.settings-group h4 {
  font-size: 11px; font-weight: 700;
  color: var(--muted); text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 10px;
}
.settings-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.settings-item-label { font-size: 14px; }
.settings-item-desc { font-size: 11px; color: var(--muted); margin-top: 2px; }
.toggle {
  width: 44px; height: 24px;
  background: var(--border);
  border-radius: 12px;
  position: relative; cursor: pointer;
  transition: all 0.2s;
}
.toggle.on { background: var(--accent); }
.toggle::after {
  content: '';
  position: absolute; top: 3px; left: 3px;
  width: 18px; height: 18px;
  background: white; border-radius: 50%;
  transition: all 0.2s;
}
.toggle.on::after { left: 23px; }

/* ═══════════════════ RESPONSIVE ═══════════════════ */
@media (min-width: 640px) {
  .resources {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
  }
  .section-head { grid-column: 1 / -1; }
  .stats-bar { gap: 40px; }
}

/* ═══════ MOBILE CAPACITOR PATCH ═══════ */
@media (max-width: 768px) {
  .topnav { padding: 0 12px; height: 50px; }
  .topnav-brand { font-size: 15px !important; }
  .hero-section { padding: 16px 12px !important; }
  .hero-title { font-size: 20px !important; }
  .search-container { margin: 10px 12px !important; }
  .stats-grid { grid-template-columns: repeat(2, 1fr) !important; gap: 8px !important; }
  .resource-card { margin: 8px 12px !important; padding: 12px !important; }
  .card-info { padding-right: 8px !important; }
  .card-title { font-size: 14px !important; }
  .card-url { font-size: 10px !important; }
  .btn-copy, .btn-open { padding: 6px 12px !important; font-size: 12px !important; }
  .tab-bar { padding: 8px 12px !important; }
  
  .modal-content { width: 92% !important; margin: 20px auto !important; padding: 20px !important; }
  .modal-content h2 { font-size: 18px !important; }
  .update-url-box { font-size: 10px !important; }
  body { -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
  input, textarea { -webkit-user-select: text; user-select: text; }
  * { -webkit-tap-highlight-color: transparent; }
}
@media (max-width: 480px) {
  .stats-grid { grid-template-columns: repeat(2, 1fr) !important; }
  .hero-title { font-size: 18px !important; }
  .resource-card { flex-direction: column !important; }
  .card-buttons { flex-direction: row !important; width: 100% !important; margin-top: 10px !important; }
  .btn-copy, .btn-open { flex: 1 !important; text-align: center !important; }
}
body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }

</style>
</head>
<body>

<!-- Particle canvas -->
<canvas id="particles-canvas"></canvas>
<div class="scanline-overlay"></div>

<!-- ═══════════════════ UPDATE MODAL ═══════════════════ -->
<div class="modal-overlay" id="updateModal">
  <div class="modal">
    <div class="modal-glow"></div>
    <div class="modal-body">
      <div class="modal-icon">
        <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </div>
      <div class="modal-title">发现新版本</div>
      <div class="modal-version" id="updateVersion">v3.0.0</div>
      <div class="modal-desc">GitHub Releases 在线更新 · 界面优化</div>
      <div class="modal-desc" style="color:var(--accent3); font-size:12px;" id="updateSource">正在检查更新...</div>

function renderResources(filter = 'all', search = '') {

/* ═══════════════════ COPY ═══════════════════ */
function copyLink(url, pwd) {
  const text = pwd ? `${url}\n密码: ${pwd}` : url;
  copyText(text);
}

function copyText(text) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => showToast('已复制到剪贴板', 'success'));
  } else {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('已复制到剪贴板', 'success');
  }
}

/* ═══════════════════ TOAST ═══════════════════ */
let toastTimer;
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.className = 'toast', 2500);
}

/* ═══════════════════ UPDATE MODAL ═══════════════════ */
const APP_VERSION = '3.0.0';
const GITHUB_API = 'https://api.github.com/repos/Ajian920/nexusvault-source/releases/latest';
let latestRelease = null;

function closeUpdateModal() {
  document.getElementById('updateModal').classList.add('hidden');
  localStorage.setItem('nv_update_dismissed', Date.now());
}

function downloadUpdate() {
  if (!latestRelease) { closeUpdateModal(); return; }
  const assets = latestRelease.assets || [];
  const ua = navigator.userAgent;
  let target = null;
  if (/Android/i.test(ua)) target = assets.find(a => a.name.endsWith('.apk'));
  else if (/Windows/i.test(ua)) target = assets.find(a => a.name.endsWith('.exe'));
  if (!target) target = assets.find(a => a.name.endsWith('.apk')) || assets.find(a => a.name.endsWith('.exe'));
  if (target) {
    window.open(target.browser_download_url, '_blank');
    showToast('正在下载 ' + target.name, 'success');
  } else {
    window.open(latestRelease.html_url, '_blank');
    showToast('已打开下载页面', 'success');
  }
  closeUpdateModal();
}

async function checkForUpdate() {
  try {
    if (localStorage.getItem('nv_autoUpdate') === '0') return;
    const dismissed = localStorage.getItem('nv_update_dismissed');
    if (dismissed && Date.now() - parseInt(dismissed) < 86400000) return;
    const resp = await fetch(GITHUB_API);
    if (!resp.ok) return;
    const release = await resp.json();
    const ver = (release.tag_name || '').replace('v', '');
    if (ver && ver !== APP_VERSION) {
      latestRelease = release;
      document.getElementById('updateVersion').textContent = 'v' + APP_VERSION + ' \u2192 v' + ver;
      document.getElementById('updateSource').textContent = '\u6765\u6e90\uff1aGitHub Releases';
      document.getElementById('updateModal').classList.remove('hidden');
    }
  } catch (e) { /* silent */ }
}

function toggleSetting(key) {
  const el = document.getElementById('toggle' + key.charAt(0).toUpperCase() + key.slice(1));
  el.classList.toggle('on');
  const on = el.classList.contains('on');

  if (key === 'particles') {
    document.getElementById('particles-canvas').style.display = on ? '' : 'none';
  } else if (key === 'scanline') {
    document.querySelector('.scanline-overlay').style.display = on ? '' : 'none';
  }

  localStorage.setItem('nv_' + key, on ? '1' : '0');
  showToast(on ? '已开启' : '已关闭');
}

/* ═══════════════════ PARTICLES ═══════════════════ */
function initParticles() {
  const canvas = document.getElementById('particles-canvas');
  const ctx = canvas.getContext('2d');
  let w, h, particles = [];

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }

  function create() {
    particles = [];
    const count = Math.min(80, Math.floor(w * h / 12000));
    for (let i = 0; i < count; i++) {
      particles.push({
        x: Math.random() * w,
        y: Math.random() * h,
        vx: (Math.random() - 0.5) * 0.4,
        vy: (Math.random() - 0.5) * 0.4,
        r: Math.random() * 1.5 + 0.5,
        a: Math.random() * 0.4 + 0.1,
        color: Math.random() > 0.5 ? '0,240,255' : '168,85,247'
      });
    }
  }

  function draw() {
    ctx.clearRect(0, 0, w, h);

    for (let i = 0; i < particles.length; i++) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      if (p.x < 0) p.x = w;
      if (p.x > w) p.x = 0;
      if (p.y < 0) p.y = h;
      if (p.y > h) p.y = 0;

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${p.color},${p.a})`;
      ctx.fill();

      for (let j = i + 1; j < particles.length; j++) {
        const p2 = particles[j];
        const dx = p.x - p2.x;
        const dy = p.y - p2.y;
        const dist = dx * dx + dy * dy;
        if (dist < 12000) {
          ctx.beginPath();
          ctx.moveTo(p.x, p.y);
          ctx.lineTo(p2.x, p2.y);
          ctx.strokeStyle = `rgba(0,240,255,${0.06 * (1 - dist / 12000)})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }

    requestAnimationFrame(draw);
  }

  resize();
  create();
  draw();
  window.addEventListener('resize', () => { resize(); create(); });
}

/* ═══════════════════ INIT ═══════════════════ */
(function init() {

  // Restore settings
  ['particles', 'scanline', 'autoUpdate'].forEach(key => {
    const val = localStorage.getItem('nv_' + key);
    if (val === '0') {
      const el = document.getElementById('toggle' + key.charAt(0).toUpperCase() + key.slice(1));
      if (el) el.classList.remove('on');
      if (key === 'particles') document.getElementById('particles-canvas').style.display = 'none';
      if (key === 'scanline') document.querySelector('.scanline-overlay').style.display = 'none';
    }
  });

  // Update check via GitHub Releases
  checkForUpdate();

  // Render
  renderResources();

  // Particles
  initParticles();
})();
